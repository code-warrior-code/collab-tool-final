services:
  - type: web
    name: collab-tool
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: collab-tool-db
          property: connectionString

databases:
  - name: collab-tool-db
    plan: free
